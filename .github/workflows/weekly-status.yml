name: HackQuest Weekly Status

on:
  schedule:
    - cron: "0 0 * * 0"   # 매주 일요일 UTC 00:00 (KST 09:00)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run weekly_status
        run: python scripts/weekly_status.py --update-readme

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update HackQuest weekly status [skip ci]"
          git push
